<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entidades</title>
</head>
<body>
    <p>Entidades HTML são sequências de caracteres que representam caracteres especiais em HTML.</p>
    <ul>
        <li>&lt; - representa o caractere menor que (<)</li>
        <li>&gt; - representa o caractere maior que (>)</li>
        <li>&amp; - representa o caractere e comercial (&)</li>
        <li>&quot; - representa o caractere de aspas duplas (")</li>
    </ul>
</body>
</html>
